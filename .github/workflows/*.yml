name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y g++ cmake make libomp-dev python3 python3-pip
        pip3 install matplotlib pandas numpy

    - name: Configure CMake
      run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

    - name: Build
      run: cmake --build build -j$(nproc)

    - name: Run solver & generate artifacts
      working-directory: build
      run: |
        ./fem_solver
        echo "✅ Solver executed successfully"

    - name: Upload VTU artifact
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: fem-results
        path: |
          build/result.vtu
          build/*.csv
          build/*.png
        retention-days: 7
